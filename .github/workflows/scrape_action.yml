name: Scrape NEPSE Data to Google Sheets

permissions:
  contents: write

on:
  push:
    branches: [ master, main ]
  schedule:
    # Runs daily at 11:15 AM UTC (5:00 PM Nepal Time)
    - cron: '15 11 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  scrape_and_upload:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create Google Sheets credentials
      env:
        GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        echo "$GOOGLE_CREDS_JSON" > google_creds.json
    
    - name: Create Data directory
      run: mkdir -p Data docs
    
    - name: Run spider
      run: |
        scrapy crawl market
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add Data/*.csv docs/*.html 2>/dev/null || true
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update NEPSE data for $(date +'%Y-%m-%d') [skip ci]"
        git push
